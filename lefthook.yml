pre-commit:
  parallel: true
  commands:
    fmt:
      run: cargo fmt --all -- --check
    clippy:
      run: cargo clippy --all-targets --all-features -- -D warnings
    # deny:
    #   run: cargo deny check

pre-push:
  parallel: true
  commands:
    fmt:
      run: cargo fmt --all
    clippy:
      run: cargo clippy --all-targets --all-features -- -D warnings
    # deny:
    #   run: cargo deny check
    check:
      run: cargo check --workspace --all-targets --locked --all-features

