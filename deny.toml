# deny.toml — cargo-deny policy for reme workspace
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

# ──────────────────────────────────────────────
# Advisories: fail on known vulnerabilities
# ──────────────────────────────────────────────
[advisories]
yanked = "warn"
unmaintained = "none"
ignore = []

# ──────────────────────────────────────────────
# Licenses: allowlist model (deny by default)
# ──────────────────────────────────────────────
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "BSL-1.0",
    "OpenSSL",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ──────────────────────────────────────────────
# Bans: prevent known-bad or duplicate crates
# ──────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
highlight = "lowest-version"

# ──────────────────────────────────────────────
# Sources: only crates.io, no git deps in prod
# ──────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
