# Resilient Messenger Client Configuration
# Default location: ~/.config/ember/config.toml

# HTTP Mailbox Peers
[[peers.http]]
url = "https://mailbox1.example.com:23003"
cert_pin = "spki//sha256/AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
tier = "quorum"
priority = 100
label = "Primary Mailbox"

[[peers.http]]
url = "https://mailbox2.example.com:23003"
cert_pin = "spki//sha256/BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB="
tier = "quorum"
priority = 90
label = "Backup Mailbox"

# MQTT Broker Peers (optional)
[[peers.mqtt]]
url = "mqtts://broker.example.com:8883"
username = "ember_client"
password = "secret_password"
client_id = "my-device-id"
tier = "quorum"
priority = 100
label = "Authenticated MQTT Broker"

# Alternative: URL-embedded credentials (explicit fields take precedence)
# [[peers.mqtt]]
# url = "mqtts://user:pass@broker.example.com:8883"
# tier = "quorum"

# Application settings
data_dir = "~/.local/share/ember"
log_level = "info"

# Embedded node (for LAN P2P)
[embedded_node]
enabled = true
http_bind = "127.0.0.1:23003"

# Outbox settings (message retry)
[outbox]
tick_interval_secs = 30
ttl_days = 7

# Delivery settings
[delivery]
quorum_strategy = "any"  # any | count | fraction | all
quorum_count = 1
